name: Council Records Fetch

on:
  schedule:
    - cron: '15 20 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-council-records:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PDF extraction dependency
        run: python -m pip install pypdf

      - name: Run council records fetcher
        run: python upper-macleay-council-intelligence/scripts/fetch_council_records.py

      - name: Run historic records backfill
        run: python upper-macleay-council-intelligence/scripts/backfill_historic_records.py

      - name: Extract PDF text
        run: python upper-macleay-council-intelligence/scripts/extract_pdf_text.py

      - name: Run council records analyzer
        run: python upper-macleay-council-intelligence/scripts/analyze_council_records.py

      - name: Link repeated matters across meetings
        run: python upper-macleay-council-intelligence/scripts/link_matters.py

      - name: Build lifecycle dashboard
        run: python upper-macleay-council-intelligence/scripts/build_lifecycle.py

      - name: Sort outputs historically
        run: python upper-macleay-council-intelligence/scripts/sort_historically.py

      - name: Commit fetched records, analysis and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upper-macleay-council-intelligence
          git diff --cached --quiet || git commit -m "Run automated council intelligence cycle"
          git push
