name: CouncilWatch Historical Ingest

on:
  workflow_dispatch:
  schedule:
    - cron: '17 19 * * 1'

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CouncilWatch dependencies
        run: pip install -r requirements-councilwatch.txt

      - name: Run CouncilWatch ingestion
        run: python scripts/ingest_kempsey_records.py

      - name: Commit updated CouncilWatch records and registers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/historical-coverage.json public/source-target-manifest.json records/raw records/text
          if git diff --cached --quiet; then
            echo "No CouncilWatch register changes."
          else
            git commit -m "Update CouncilWatch historical records"
            git push
          fi
